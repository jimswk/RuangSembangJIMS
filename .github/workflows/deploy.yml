    name: Deploy React App to GitHub Pages

    on:
      push:
        branches:
          - main # Pastikan ini sepadan dengan nama cawangan utama anda (main atau master)

    jobs:
      build-and-deploy:
        runs-on: ubuntu-latest
        permissions: # Tambahkan blok ini
          contents: write # Diperlukan untuk checkout dan push
          pages: write # Diperlukan untuk menyebarkan ke GitHub Pages
          id-token: write # Diperlukan untuk OIDC (jika digunakan, amalan baik untuk disertakan)

        steps:
          - name: Checkout 🛎️
            uses: actions/checkout@v4

          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
              node-version: '18' # Anda boleh gunakan '20' jika mahu versi Node.js yang lebih baru

          - name: Install dependencies
            run: npm install

          - name: Build React App
            run: npm run build

          - name: Deploy to GitHub Pages
            uses: peaceiris/actions-gh-pages@v4
            with:
              github_token: ${{ secrets.GITHUB_TOKEN }}
              publish_dir: ./build
              # cname: your-custom-domain.com # Nyahkomen dan tukar jika anda menggunakan domain kustom
